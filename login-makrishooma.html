<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود | جنگ جهانی ماکریشوما</title>

<link rel="stylesheet" href="css/login-makrishooma.css">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="overlay"></div>

<div class="login-box">

<h1>🔐 ورود به بازی</h1>

<p>نام کاربری و رمز عبور خود را وارد کنید.</p>

<form id="loginForm">

<input
type="text"
id="username"
placeholder="نام کاربری"
required>

<input
type="password"
id="password"
placeholder="رمز عبور"
required>

<button type="submit">
ورود به بازی
</button>

</form>

<p id="errorMessage"></p>

<button id="backHome">
🏠 بازگشت
</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="login-makrishooma.js"></script>

</body>

</html>
