<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>انتخاب کشور | جنگ جهانی ماکریشوما</title>

<link rel="stylesheet" href="css/select-country-makrishooma.css">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="overlay"></div>

<div class="container">

<h1>🌍 انتخاب کشور</h1>

<p>کشور مورد نظر خود را انتخاب کنید.</p>

<div class="countries">

<div class="country" onclick="selectCountry('آمریکا')">

<h2>🇮🇷 ایران</h2>

<p>سلامت: <b>100%</b></p>

<p>🚀 موشک: 100</p>

<p>💣 بمب: 55</p>

<p>☢️ بمب اتم: 5</p>

<p>💰 پول: 100 پک</p>

</div>

<div class="country" onclick="selectCountry('چین')">

<h2>🇨🇳 چین</h2>

<p>سلامت: <b>100%</b></p>

<p>🚀 موشک: 100</p>

<p>💣 بمب: 45</p>

<p>☢️ بمب اتم: 5</p>

<p>💰 پول: 100 پک</p>

</div>

<div class="country" onclick="selectCountry('قزاقستان')">

<h2>🇰🇿 قزاقستان</h2>

<p>سلامت: <b>100%</b></p>

<p>🚀 موشک: 100</p>

<p>💣 بمب: 45</p>

<p>☢️ بمب اتم: 4</p>

<p>💰 پول: 100 پک</p>

</div>

</div>

<p id="message"></p>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const username = localStorage.getItem("loggedUser");

if (!username) {
    window.location.href = "login-makrishooma.html";
}

socket.emit("join-lobby", {
    username: username
});

function selectCountry(country){

    let id = "";

    if(country === "ایران") id = "iri";
    if(country === "چین") id = "china";
    if(country === "قزاقستان") id = "kazakhstan";

    socket.emit("select-country", id);

    document.getElementById("message").innerHTML =
    "✅ کشور انتخاب شد. در انتظار سایر بازیکنان...";
}

socket.on("error-message",(msg)=>{

    document.getElementById("message").innerHTML="❌ "+msg;

});

socket.on("game-start",()=>{

    window.location.href="game-makrishooma.html";

});

</script>

</body>

</html>
